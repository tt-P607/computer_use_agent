<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>白木夕的粉色小屋</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 100%);
            font-family: "Microsoft YaHei", sans-serif;
            color: #d63384;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff0f8;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.15);
            padding: 40px 50px;
            max-width: 420px;
            text-align: center;
            border: 2px solid #ffcce5;
        }
        h1 {
            font-size: 32px;
            margin: 0 0 10px;
            letter-spacing: 2px;
        }
        .age {
            font-size: 18px;
            margin: 0 0 25px;
            color: #e91e63;
        }
        .hobby {
            font-size: 16px;
            line-height: 1.8;
            margin: 0 0 25px;
            color: #ad1457;
        }
        .welcome {
            font-size: 18px;
            font-weight: bold;
            color: #c2185b;
            margin: 0 0 25px;
        }
        img {
            width: 180px;
            height: auto;
            border-radius: 16px;
            border: 3px solid #ffcce5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>白木夕</h1>
        <p class="age">19岁</p>
        <p class="hobby">
            数码控 | 文学少女<br>
            音游高玩 | MMORPG开荒队长
        </p>
        <p class="welcome">欢迎来和我交朋友呀～一起探索更大的世界！</p>
        <img src="https://placekitten.com/300/200" alt="萌萌的小猫">
    </div>
</body>
</html>
